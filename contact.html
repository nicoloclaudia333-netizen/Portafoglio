        <!-- Contact Title -->
        <div class="contact-header">
            <h1 class="contact-title">Contattami</h1>
            <p class="contact-subtitle">Hai un progetto in mente? Parliamone!</p>
        </div>

        <!-- Contact Content -->
        <div class="contact-content">
            <div class="row">
                <!-- Contact Form -->
                <div class="col-lg-7">
                    <div class="contact-form-wrapper">
                        <form action="https://formspree.io/f/mwpgvebw" method="POST" class="contact-form">
                            <div class="form-group">
                                <label for="name">
                                    <i class="fas fa-user"></i> Nome Completo
                                </label>
                                <input type="text" id="name" name="name" class="form-control" placeholder="Mario Rossi" required>
                            </div>

                            <div class="form-group">
                                <label for="email">
                                    <i class="fas fa-envelope"></i> Email
                                </label>
                                <input type="email" id="email" name="email" class="form-control" placeholder="mario.rossi@email.com" required>
                            </div>

                            <div class="form-group">
                                <label for="subject">
                                    <i class="fas fa-tag"></i> Oggetto
                                </label>
                                <input type="text" id="subject" name="subject" class="form-control" placeholder="Richiesta di collaborazione" required>
                            </div>

                            <div class="form-group">
                                <label for="message">
                                    <i class="fas fa-comment-dots"></i> Messaggio
                                </label>
                                <textarea id="message" name="message" class="form-control" rows="6" placeholder="Scrivi qui il tuo messaggio..." required></textarea>
                            </div>

                            <button type="submit" class="submit-btn">
                                <i class="fas fa-paper-plane"></i> Invia Messaggio
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Contact Info -->
                <div class="col-lg-5">
                    <div class="contact-info-wrapper">
                        <h3 class="info-title">Altre informazioni</h3>
                        
                        <div class="info-item">
                            <div class="info-icon">
                                <i class="fas fa-map-marker-alt"></i>
                            </div>
                            <div class="info-text">
                                <h4>Località</h4>
                                <p>Roma, Italia</p>
                            </div>
                        </div>

                        <div class="info-item">
                            <div class="info-icon">
                                <i class="fas fa-clock"></i>
                            </div>
                            <div class="info-text">
                                <h4>Disponibilità</h4>
                                <p>Lun - Ven: 9:00 - 18:00</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
